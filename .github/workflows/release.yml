name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild

      - name: Build (TypeScript + Vite + Electron)
        run: npx tsc && npx vite build && npx electron-builder --${{ matrix.platform }} --publish never

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*/Clockwise-Windows-*-Setup.exe
            release/*/Clockwise-Mac-*-Installer.dmg
            release/*/Clockwise-Linux-*.AppImage
